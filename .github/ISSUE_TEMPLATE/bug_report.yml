name: Bug report
description: Report a reproducible problem in AgentPay Backend.
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please do not include API keys, private keys, seed phrases, or other secrets.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: Describe the problem and the affected endpoint or workflow.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide the smallest reproducible case.
      placeholder: |
        1. Start the API with ...
        2. Call ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead?
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: "20.x"
  - type: input
    id: npm
    attributes:
      label: npm version
      placeholder: "10.x"
  - type: textarea
    id: logs
    attributes:
      label: Logs or response body
      description: Remove any secrets before pasting logs.
      render: shell
  - type: textarea
    id: verification
    attributes:
      label: Verification
      description: Which checks did you run?
      placeholder: npm run lint, npm run build, npm test
